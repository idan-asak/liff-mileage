<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朝活マイレージ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .card-header h1 {
            font-size: 20px;
            color: #333;
        }
        .card-header p {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .points-display {
            text-align: center;
            padding: 20px 0;
        }
        .points-number {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
        }
        .points-unit {
            font-size: 18px;
            color: #667eea;
            margin-left: 4px;
        }
        .discount-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
        }
        .streak-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .streak-fire { font-size: 24px; }
        .streak-text {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }
        .points-explain {
            background: #f0f2ff;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .points-explain p {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
            margin: 0;
        }
        .points-explain strong {
            color: #667eea;
        }
        .bonus-table {
            width: 100%;
            margin-top: 12px;
            border-collapse: collapse;
        }
        .bonus-table th {
            font-size: 11px;
            color: #888;
            font-weight: 600;
            padding: 4px 8px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        .bonus-table td {
            font-size: 12px;
            color: #555;
            padding: 5px 8px;
            text-align: center;
        }
        .bonus-table tr.active-row td {
            color: #667eea;
            font-weight: 700;
            background: #f0f2ff;
            border-radius: 6px;
        }
        .bonus-section {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #eee;
        }
        .bonus-section-title {
            font-size: 13px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .points-breakdown {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .breakdown-item {
            font-size: 13px;
            color: #555;
            font-weight: 600;
        }
        .breakdown-plus {
            font-size: 14px;
            color: #aaa;
        }
        .breakdown-equals {
            font-size: 14px;
            color: #667eea;
            font-weight: 700;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .stat-item {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 14px 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
        .stat-unit {
            font-size: 12px;
            color: #999;
            font-weight: 400;
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .milestone-bar {
            margin-top: 8px;
        }
        .milestone-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        .progress-bg {
            background: #e8e8e8;
            border-radius: 8px;
            height: 12px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 8px;
            transition: width 0.8s ease;
        }
        .milestone-remaining {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-top: 8px;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 16px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            text-align: center;
            padding: 40px 20px;
        }
        .error-msg p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>マイレージを読み込み中...</p>
        </div>

        <div id="content" style="display:none;">
            <div class="card">
                <div class="card-header">
                    <h1>朝活マイレージ</h1>
                    <p id="userName"></p>
                </div>
                <div class="points-display">
                    <span class="points-number" id="totalPoints">0</span>
                    <span class="points-unit">pt</span>
                    <div>
                        <span class="discount-badge" id="discountBadge"></span>
                    </div>
                    <div class="streak-display" id="streakDisplay" style="display:none;">
                        <span class="streak-fire">🔥</span>
                        <span class="streak-text" id="streakText"></span>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h1>ポイントの内訳</h1>
                </div>
                <div class="points-explain">
                    <p>1日に<strong>いずれかの活動</strong>をすると<strong>1pt</strong><br>（同じ日の複数活動は重複カウントなし）</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="vcCount">0<span class="stat-unit">回</span></div>
                        <div class="stat-label">VC参加</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="lineCount">0<span class="stat-unit">回</span></div>
                        <div class="stat-label">LINE宣言</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="chatCount">0<span class="stat-unit">回</span></div>
                        <div class="stat-label">チャット</div>
                    </div>
                </div>
                <div class="points-breakdown">
                    <span class="breakdown-item" id="activityDays">活動日数 0日</span>
                    <span class="breakdown-plus">+</span>
                    <span class="breakdown-item">ボーナス <span id="streakBonus">0</span>pt</span>
                    <span class="breakdown-equals">=</span>
                    <span class="breakdown-item" style="color:#667eea;" id="totalCalc">0pt</span>
                </div>
                <div class="bonus-section">
                    <div class="bonus-section-title">連続活動ボーナス（月次）</div>
                    <table class="bonus-table">
                        <tr>
                            <th>連続日数</th>
                            <th>7日</th>
                            <th>14日</th>
                            <th>21日</th>
                            <th>30日</th>
                        </tr>
                        <tr>
                            <td style="color:#888; font-size:11px;">ボーナス</td>
                            <td id="b7">+2pt</td>
                            <td id="b14">+3pt</td>
                            <td id="b21">+5pt</td>
                            <td id="b30">+7pt</td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="card" id="milestoneCard">
                <div class="card-header">
                    <h1>次のマイルストーン</h1>
                </div>
                <div class="milestone-bar">
                    <div class="milestone-label">
                        <span id="currentPt">0pt</span>
                        <span id="nextMilestone">--pt</span>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <p class="milestone-remaining">あと <strong id="remaining">0</strong> pt</p>
                </div>
            </div>
        </div>

        <div id="notFound" style="display:none;">
            <div class="card error-msg">
                <p id="notFoundMsg"></p>
            </div>
        </div>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script>
        const LIFF_ID = "2006372055-8alSSFm1";
        const API_BASE = "https://api.asa-plant.com";

        document.addEventListener("DOMContentLoaded", function () {
            liff.init({ liffId: LIFF_ID })
                .then(function () {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                        return;
                    }
                    return liff.getProfile();
                })
                .then(function (profile) {
                    if (!profile) return;
                    document.getElementById("userName").textContent = profile.displayName;
                    fetchMileage(profile.userId);
                })
                .catch(function (err) {
                    console.error("LIFF init error:", err);
                    showError("初期化に失敗しました。もう一度お試しください。");
                });
        });

        function fetchMileage(lineUserId) {
            fetch(API_BASE + "/api/mileage?line_user_id=" + encodeURIComponent(lineUserId))
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    document.getElementById("loading").style.display = "none";

                    if (!data.found) {
                        document.getElementById("notFoundMsg").textContent = data.message;
                        document.getElementById("notFound").style.display = "block";
                        return;
                    }

                    document.getElementById("content").style.display = "block";
                    document.getElementById("totalPoints").textContent = data.total_points;
                    document.getElementById("vcCount").innerHTML = data.vc_count + '<span class="stat-unit">回</span>';
                    document.getElementById("lineCount").innerHTML = data.line_count + '<span class="stat-unit">回</span>';
                    document.getElementById("chatCount").innerHTML = data.chat_count + '<span class="stat-unit">回</span>';
                    document.getElementById("streakBonus").textContent = data.streak_bonus;
                    document.getElementById("activityDays").textContent = "活動日数 " + data.activity_days + "日";
                    document.getElementById("totalCalc").textContent = data.total_points + "pt";

                    // ボーナステーブルのハイライト
                    var streak = data.current_streak;
                    var bonusMap = [[30, "b30"], [21, "b21"], [14, "b14"], [7, "b7"]];
                    for (var b = 0; b < bonusMap.length; b++) {
                        var el = document.getElementById(bonusMap[b][1]);
                        if (streak >= bonusMap[b][0]) {
                            el.style.color = "#667eea";
                            el.style.fontWeight = "700";
                            el.style.background = "#f0f2ff";
                            el.style.borderRadius = "6px";
                        }
                    }

                    // 割引表示
                    if (data.current_discount > 0) {
                        if (data.current_discount >= 1000) {
                            document.getElementById("discountBadge").textContent = "🎉 無料達成！";
                        } else {
                            document.getElementById("discountBadge").textContent =
                                "毎月 " + data.current_discount + "円 割引中";
                        }
                    } else {
                        document.getElementById("discountBadge").style.display = "none";
                    }

                    // ストリーク
                    if (data.current_streak > 0) {
                        document.getElementById("streakDisplay").style.display = "flex";
                        document.getElementById("streakText").textContent =
                            data.current_streak + "日連続活動中";
                    }

                    // マイルストーン
                    if (data.next_milestone) {
                        document.getElementById("currentPt").textContent = data.total_points + "pt";
                        document.getElementById("nextMilestone").textContent = data.next_milestone + "pt";
                        document.getElementById("remaining").textContent = data.remaining;

                        var prev = 0;
                        var milestones = [5, 30, 60, 90, 120];
                        for (var i = 150; i < 3750; i += 30) milestones.push(i);
                        for (var j = 0; j < milestones.length; j++) {
                            if (milestones[j] === data.next_milestone) break;
                            prev = milestones[j];
                        }
                        var range = data.next_milestone - prev;
                        var progress = data.total_points - prev;
                        var pct = Math.min(Math.max((progress / range) * 100, 2), 100);
                        document.getElementById("progressFill").style.width = pct + "%";
                    } else {
                        document.getElementById("milestoneCard").style.display = "none";
                    }
                })
                .catch(function (err) {
                    console.error("API error:", err);
                    showError("データの取得に失敗しました。しばらくしてからお試しください。");
                });
        }

        function showError(msg) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("notFoundMsg").textContent = msg;
            document.getElementById("notFound").style.display = "block";
        }
    </script>
</body>
</html>
